name: Lint

on:
  workflow_call:

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
    - name: Install dependencies
      run: npm ci
      shell: bash
    - name: Lint
      run: npm run test:lint
      shell: bash
